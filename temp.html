<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glyph Replacement Picker</title>
  <style>
    :root {
      --panel: #111b31;
      --panel-2: #0f2238;
      --text: #d8e6ff;
      --muted: #9bb1d8;
      --line: #294064;
      --btn: #1d3a61;
      --btn-h: #265084;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #0b1221 0%, #111a2b 100%);
      color: var(--text);
    }
    .wrap { max-width: 1220px; margin: 24px auto; padding: 0 16px 28px; }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(0,0,0,0.28);
    }
    .head { padding: 14px 16px; border-bottom: 1px solid var(--line); background: var(--panel-2); }
    .title { font-size: 18px; font-weight: 800; margin: 0; }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 16px; border-bottom: 1px solid var(--line); }
    button {
      background: var(--btn); color: var(--text); border: 1px solid #3a5d8f; border-radius: 8px;
      padding: 8px 12px; cursor: pointer; font-weight: 700; font-size: 12px;
    }
    button:hover { background: var(--btn-h); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #203352; vertical-align: top; }
    th { background: #112440; color: #b8cff6; position: sticky; top: 0; z-index: 1; }
    td code {
      font-family: Consolas, Menlo, monospace; background: #0f2744; border: 1px solid #304f79;
      border-radius: 5px; padding: 1px 5px; white-space: nowrap;
    }
    .risk { display:inline-block; border-radius:999px; font-size:11px; font-weight:800; padding:2px 8px; border:1px solid transparent; }
    .risk-high { color:#ffd6d6; background:rgba(255,107,107,.17); border-color:rgba(255,107,107,.45); }
    .risk-medium { color:#ffe8bc; background:rgba(244,184,74,.17); border-color:rgba(244,184,74,.45); }
    .risk-low { color:#ceffe9; background:rgba(99,209,168,.16); border-color:rgba(99,209,168,.45); }
    .opt { display:grid; gap:6px; min-width:270px; }
    .opt label { display:flex; align-items:center; gap:8px; color:#d0e2ff; }
    .opt small { color: var(--muted); font-size: 11px; }
    .payload { padding: 14px 16px; border-top: 1px solid var(--line); background: #0e1f37; }
    textarea {
      width:100%; min-height:260px; resize:vertical; border-radius:8px; border:1px solid #395884;
      background:#091528; color:#d6e7ff; font-family:Consolas, Menlo, monospace; font-size:12px; padding:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="head">
        <h1 class="title">Glyph Replacement Picker</h1>
        <p class="sub">Safe options only. Symbols are shown visually; payload uses safe strategy tokens.</p>
      </div>
      <div class="controls">
        <button id="highOnlyBtn">Apply To High Risk Only</button>
        <button id="allOnBtn">Apply To All</button>
        <button id="clearBtn">Clear Apply Checks</button>
        <button id="recommendedBtn">Set Recommended Options</button>
        <button id="genBtn">Generate Payload</button>
        <button id="copyBtn">Copy Payload</button>
      </div>
      <div style="overflow:auto; max-height:58vh;">
        <table>
          <thead>
            <tr><th>Apply</th><th>Usage</th><th>Current</th><th>Risk</th><th>Pick Replacement (rendered)</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="payload">
        <div style="margin-bottom:6px;color:#9bb1d8;">Handoff JSON:</div>
        <textarea id="out"></textarea>
      </div>
    </div>
  </div>

  <script>
    function cp(hex) { return String.fromCodePoint(parseInt(hex, 16)); }
    const S = {
      up: cp('2191'), down: cp('2193'), right: cp('2192'), triUp: cp('25B2'), triDown: cp('25BC'),
      chevron: cp('25B8'), play: cp('25B6'), times: cp('00D7'), bullet: cp('2022'), middot: cp('00B7'),
      emdash: cp('2014'), endash: cp('2013'), ellipsis: cp('2026'), check: cp('2713'), ccw: cp('21BA')
    };

    const items = [
      { id:'g1', usage:'Sort ascending', current:S.up, risk:'High', rec:'a', options:[
        {id:'a', preview:S.up + ' (up arrow)', strategy:'css_escape_2191'},
        {id:'b', preview:S.triUp + ' (triangle up)', strategy:'css_escape_25B2'},
        {id:'c', preview:'+', strategy:'ascii_plus'} ] },
      { id:'g2', usage:'Sort descending', current:S.down, risk:'High', rec:'a', options:[
        {id:'a', preview:S.down + ' (down arrow)', strategy:'css_escape_2193'},
        {id:'b', preview:S.triDown + ' (triangle down)', strategy:'css_escape_25BC'},
        {id:'c', preview:'-', strategy:'ascii_hyphen'} ] },
      { id:'g3', usage:'Section chevron (collapsed)', current:S.play, risk:'High', rec:'a', options:[
        {id:'a', preview:S.play + ' (right chevron)', strategy:'html_entity_9656'},
        {id:'b', preview:'> (ASCII)', strategy:'ascii_gt'},
        {id:'c', preview:S.chevron + ' (small right triangle)', strategy:'css_escape_25B8'} ] },
      { id:'g4', usage:'Group chevron', current:S.chevron, risk:'High', rec:'a', options:[
        {id:'a', preview:S.play + ' (right chevron)', strategy:'html_entity_9656'},
        {id:'b', preview:'> (ASCII)', strategy:'ascii_gt'},
        {id:'c', preview:S.chevron + ' (small right triangle)', strategy:'css_escape_25B8'} ] },
      { id:'g5', usage:'Reset icon label', current:S.ccw + ' Reset', risk:'High', rec:'a', options:[
        {id:'a', preview:'Reset', strategy:'ascii_text_only'},
        {id:'b', preview:'Reset (' + S.ccw + ' icon)', strategy:'entity_8634_suffix'},
        {id:'c', preview:S.ccw + ' Reset', strategy:'entity_8634_prefix'} ] },
      { id:'g6', usage:'Trend markers', current:S.up + ' ' + S.down + ' ' + S.right, risk:'High', rec:'a', options:[
        {id:'a', preview:S.up + ' / ' + S.down + ' / ' + S.right, strategy:'html_entities_arrows'},
        {id:'b', preview:S.triUp + ' / ' + S.triDown + ' / ' + S.chevron, strategy:'css_escapes_triads'},
        {id:'c', preview:'up / down / flat', strategy:'ascii_words'} ] },
      { id:'g7', usage:'Dismiss close', current:cp('2715'), risk:'High', rec:'a', options:[
        {id:'a', preview:S.times + ' (close)', strategy:'html_entity_times'},
        {id:'b', preview:'x', strategy:'ascii_x'},
        {id:'c', preview:'close', strategy:'ascii_word'} ] },
      { id:'g8', usage:'Multiplication marker', current:S.times + '2', risk:'High', rec:'a', options:[
        {id:'a', preview:'x2', strategy:'ascii_x2'},
        {id:'b', preview:'2x', strategy:'ascii_2x'},
        {id:'c', preview:S.times + '2', strategy:'html_entity_times2'} ] },
      { id:'g9', usage:'Bullet dot', current:S.bullet, risk:'Medium', rec:'a', options:[
        {id:'a', preview:S.bullet + ' (bullet)', strategy:'css_escape_2022'},
        {id:'b', preview:'-', strategy:'ascii_hyphen_bullet'},
        {id:'c', preview:S.middot + ' (middot)', strategy:'html_entity_middot'} ] },
      { id:'g10', usage:'Mid separator', current:S.middot, risk:'Medium', rec:'a', options:[
        {id:'a', preview:S.middot + ' (middot)', strategy:'html_entity_middot'},
        {id:'b', preview:'|', strategy:'ascii_pipe'},
        {id:'c', preview:'-', strategy:'ascii_hyphen'} ] },
      { id:'g11', usage:'Em dash in copy', current:S.emdash, risk:'High', rec:'a', options:[
        {id:'a', preview:S.emdash + ' (em dash)', strategy:'html_entity_mdash'},
        {id:'b', preview:'--', strategy:'ascii_double_hyphen'},
        {id:'c', preview:S.endash + ' (en dash)', strategy:'html_entity_ndash'} ] },
      { id:'g12', usage:'Ellipsis', current:S.ellipsis, risk:'High', rec:'a', options:[
        {id:'a', preview:'...', strategy:'ascii_ellipsis'},
        {id:'b', preview:S.ellipsis + ' (ellipsis)', strategy:'html_entity_hellip'},
        {id:'c', preview:'..', strategy:'ascii_double_dot'} ] },
      { id:'g13', usage:'Checkmark success', current:S.check + ' Saved', risk:'High', rec:'a', options:[
        {id:'a', preview:'Saved', strategy:'ascii_saved'},
        {id:'b', preview:'OK', strategy:'ascii_ok'},
        {id:'c', preview:S.check + ' Saved', strategy:'html_entity_check_saved'} ] },
      { id:'g14', usage:'Existing HTML entities', current:'&#9656; / &uarr;', risk:'Low', rec:'a', options:[
        {id:'a', preview:'(keep)', strategy:'keep'},
        {id:'b', preview:'plain ASCII fallback', strategy:'ascii_fallback'} ] },
      { id:'g15', usage:'Plain ASCII symbols', current:'> - x ...', risk:'Low', rec:'a', options:[
        {id:'a', preview:'(keep)', strategy:'keep'} ] }
    ];

    const rowsEl = document.getElementById('rows');
    const outEl = document.getElementById('out');

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }
    function riskClass(risk) { return risk === 'High' ? 'risk risk-high' : (risk === 'Medium' ? 'risk risk-medium' : 'risk risk-low'); }

    function renderRows() {
      rowsEl.innerHTML = items.map(item => {
        const opts = item.options.map((opt, i) => {
          const cid = item.id + '_opt_' + i;
          const checked = opt.id === item.rec ? 'checked' : '';
          return '<label for="' + cid + '"><input type="radio" id="' + cid + '" name="' + item.id + '_choice" value="' + opt.id + '" ' + checked + ' /><span>' + esc(opt.preview) + '</span></label>';
        }).join('');
        const rec = item.options.find(o => o.id === item.rec);
        return '<tr data-item-id="' + item.id + '" data-risk="' + item.risk + '">'
          + '<td><input type="checkbox" class="apply" checked /></td>'
          + '<td>' + esc(item.usage) + '</td>'
          + '<td><code>' + esc(item.current) + '</code></td>'
          + '<td><span class="' + riskClass(item.risk) + '">' + item.risk + '</span></td>'
          + '<td><div class="opt">' + opts + '<small>Recommended: <code>' + esc(rec.preview) + '</code></small></div></td>'
          + '</tr>';
      }).join('');
    }

    function setApply(mode) {
      document.querySelectorAll('tr[data-item-id]').forEach(tr => {
        const cb = tr.querySelector('.apply');
        if (mode === 'high') cb.checked = tr.dataset.risk === 'High';
        else if (mode === 'all') cb.checked = true;
        else cb.checked = false;
      });
    }

    function setRecommended() {
      items.forEach(item => {
        document.querySelectorAll('input[name="' + item.id + '_choice"]').forEach(r => { r.checked = r.value === item.rec; });
      });
    }

    function generatePayload() {
      const picks = [];
      document.querySelectorAll('tr[data-item-id]').forEach(tr => {
        const id = tr.dataset.itemId;
        const item = items.find(x => x.id === id);
        const apply = tr.querySelector('.apply').checked;
        const selected = tr.querySelector('input[name="' + id + '_choice"]:checked');
        const selectedOpt = item.options.find(o => o.id === (selected ? selected.value : item.rec));
        picks.push({
          id: item.id,
          usage: item.usage,
          risk: item.risk,
          apply: apply,
          current: item.current,
          replacement_preview: selectedOpt.preview,
          replacement_strategy: selectedOpt.strategy
        });
      });

      outEl.value = JSON.stringify({
        instructions: 'Apply selected glyph/symbol replacements only where apply=true. Keep behavior unchanged. Use replacement_strategy for safe implementation.',
        generatedAt: new Date().toISOString(),
        approved_count: picks.filter(p => p.apply).length,
        approved_replacements: picks.filter(p => p.apply),
        deferred_replacements: picks.filter(p => !p.apply).map(p => ({
          id: p.id,
          usage: p.usage,
          current: p.current,
          replacement_preview: p.replacement_preview,
          replacement_strategy: p.replacement_strategy
        }))
      }, null, 2);
    }

    document.getElementById('highOnlyBtn').addEventListener('click', () => setApply('high'));
    document.getElementById('allOnBtn').addEventListener('click', () => setApply('all'));
    document.getElementById('clearBtn').addEventListener('click', () => setApply('none'));
    document.getElementById('recommendedBtn').addEventListener('click', setRecommended);
    document.getElementById('genBtn').addEventListener('click', generatePayload);
    document.getElementById('copyBtn').addEventListener('click', async () => {
      generatePayload();
      try { await navigator.clipboard.writeText(outEl.value); } catch (_) {}
      outEl.focus();
      outEl.select();
    });

    renderRows();
    generatePayload();
  </script>
</body>
</html>
