name = "scarabev-backend-production"
main = "src/index.ts"
compatibility_date = "2026-04-02"
workers_dev = true

[vars]
APP_NAME = "scarabev-backend"
APP_ENV = "production"
LOG_LEVEL = "info"
OBS_SAMPLE_RATE = "0.2"
BACKUP_ENABLED = "false"
BACKUP_RETENTION_DAYS = "14"
BACKUP_REQUIRE_EXTERNAL = "false"
BACKUP_OBJECT_PREFIX = "snapshots"

[[d1_databases]]
binding = "DB"
database_name = "scarabev-backend-production"
database_id = "02b7cda8-ed66-4340-8a44-457226b11ca2"
