name = "scarabev-backend-staging"
main = "src/index.ts"
compatibility_date = "2026-04-02"
workers_dev = true

[vars]
APP_NAME = "scarabev-backend"
APP_ENV = "staging"
LOG_LEVEL = "info"
OBS_SAMPLE_RATE = "1"
BACKUP_ENABLED = "true"
BACKUP_RETENTION_DAYS = "7"
BACKUP_REQUIRE_EXTERNAL = "true"
BACKUP_OBJECT_PREFIX = "snapshots"

[triggers]
crons = ["0 9 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "scarabev-backend-staging"
database_id = "704619f4-eb84-4c4f-a978-b8eb2d781338"

[[r2_buckets]]
binding = "BACKUP_R2"
bucket_name = "scarabev-backups-staging"
